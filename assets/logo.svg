<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#e8d5a0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="wing-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8d5a0"/>
    </linearGradient>
  </defs>

  <!-- Circle border -->
  <circle cx="100" cy="100" r="90" stroke="url(#gold-grad)" stroke-width="3" fill="none"/>

  <!-- Van body - rounded cargo area -->
  <path d="M72 118 L72 82 Q72 76 78 76 L138 76 Q144 76 148 82 L156 96 Q158 100 158 104 L158 118"
        stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Windshield divider -->
  <line x1="132" y1="76" x2="144" y2="96" stroke="url(#gold-grad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Van bottom line -->
  <line x1="64" y1="118" x2="168" y2="118" stroke="url(#gold-grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Front wheel -->
  <circle cx="142" cy="118" r="14" fill="none" stroke="url(#gold-grad)" stroke-width="3.5"/>
  <circle cx="142" cy="118" r="5" fill="url(#gold-grad)"/>

  <!-- Rear wheel -->
  <circle cx="90" cy="118" r="14" fill="none" stroke="url(#gold-grad)" stroke-width="3.5"/>
  <circle cx="90" cy="118" r="5" fill="url(#gold-grad)"/>

  <!-- Wing - flowing from van side sweeping up and back -->
  <path d="M72 90 Q60 88 48 78 Q40 70 36 58 Q42 66 52 72 Q62 78 72 80"
        stroke="url(#wing-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M72 82 Q56 76 44 64 Q36 54 34 42 Q40 52 50 60 Q60 68 72 72"
        stroke="url(#wing-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M72 74 Q54 66 42 52 Q34 42 32 30 Q38 40 48 50 Q58 58 72 64"
        stroke="url(#wing-grad)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Speed lines behind van -->
  <line x1="42" y1="100" x2="62" y2="100" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="108" x2="64" y2="108" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
